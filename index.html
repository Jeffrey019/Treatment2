<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <h2>Sistem Layanan Mahasiswa</h2>
            <nav>
                <a href="index.html">Lapor</a>
                <a href="riwayat.html">Riwayat</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="container">
            <h1>Form Input Data</h1>
            <form id="formData">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" id="nama" placeholder="Masukkan nama mahasiswa" required>
                </div>
                <div class="form-group">
                    <label>NIM</label>
                    <input type="text" id="nim" placeholder="Masukkan NIM" required>
                </div>
                <div class="form-group">
                    <label>Jenis Layanan</label>
                    <select id="layanan" required>
                        <option value="">-- Pilih Jenis Layanan --</option>
                        <option value="SKA">SKA — Surat Aktif Kuliah</option>
                        <option value="CAK">CAK — Cuti Akademik</option>
                        <option value="TNM">TNM — Transkrip Nilai</option>
                        <option value="PDA">PDA — Perubahan Data</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Keterangan</label>
                    <textarea id="keterangan" rows="4" placeholder="Tuliskan deskripsi ringkas..."></textarea>
                </div>
                <button type="submit">Simpan Data</button>
            </form>
        </section>
    </main>

    <footer>
        <p>2026 © Sistem Layanan Mahasiswa</p>
    </footer>

    <script src="js/script.js"></script>

</body>

</html>
